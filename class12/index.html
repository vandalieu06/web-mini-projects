<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Animales</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./main.js" defer></script>
    <style>
      .boxs-animals {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1.5rem;
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
      <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-gray-800">Panel de Mascotas</h1>
        <p class="text-gray-600">
          Gestión de animales utilizando clases de JavaScript
        </p>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <section
          class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-fit"
        >
          <h2 class="text-xl font-semibold mb-4">Añadir Mascota</h2>
          <form class="animal-form space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700">
                Nombre
              </label>
              <input
                type="text"
                name="name"
                class="w-full p-2 border rounded-md"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">
                Edad
              </label>
              <input
                type="number"
                name="edat"
                class="w-full p-2 border rounded-md"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">
                URL Foto
              </label>
              <input
                type="url"
                name="imagen"
                class="w-full p-2 border rounded-md"
                placeholder="https://..."
                required
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">
                Tipo
              </label>
              <select
                name="tipo"
                class="animal-tipo w-full p-2 border rounded-md"
                required
              >
                <option value="">Selecciona tipo</option>
                <option value="dog">Perro (Gos)</option>
                <option value="cat">Gato (Gat)</option>
                <option value="bird">Pájaro (Ocell)</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">
                Raza (Solo para perros)
              </label>
              <input
                type="text"
                name="raza"
                class="animal-raza w-full p-2 border rounded-md bg-gray-100"
                disabled
              />
            </div>
            <button
              type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition"
            >
              Guardar Animal
            </button>
          </form>
        </section>

        <!-- Listado y Buscador -->
        <section class="lg:col-span-2">
          <div class="mb-6">
            <input
              type="search"
              placeholder="Buscar por nombre, tipo o raza..."
              class="w-full p-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none"
            />
          </div>

          <div class="boxs-animals"></div>
        </section>
      </div>
    </div>
  </body>
</html>
