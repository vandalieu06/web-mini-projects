<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Home</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script defer src="main.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    </head>
    <body>
        <header
            class="w-full h-[80px] py-4 px-8 flex justify-center items-center text-bold text-white font-bold bg-gray-800"
        >
            <p class="text"></p>
        </header>
        <main>
            <div class="bg-gray-100 h-max px-8 py-32">
                <div class="container mx-auto">
                    <h1 class="text-3xl font-bold text-center mb-8">Tareas</h1>

                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="flex-1 bg-gray-200 p-4 rounded-lg shadow">
                            <h2 class="text-xl font-semibold mb-4">To Do</h2>
                            <ul
                                id="todo-list"
                                class="min-h-[200px] space-y-2"
                            ></ul>
                            <button
                                type="button"
                                onclick="openTaskModal('todo')"
                                class="mt-4 w-full bg-teal-500 text-white py-2 px-4 rounded hover:bg-teal-600 transition duration-300"
                            >
                                Add Task
                            </button>
                        </div>

                        <div class="flex-1 bg-gray-200 p-4 rounded-lg shadow">
                            <h2 class="text-xl font-semibold mb-4">
                                In Progress
                            </h2>
                            <ul
                                id="progress-list"
                                class="min-h-[200px] space-y-2"
                            ></ul>
                        </div>

                        <div class="flex-1 bg-gray-200 p-4 rounded-lg shadow">
                            <h2 class="text-xl font-semibold mb-4">Done</h2>
                            <ul
                                id="done-list"
                                class="min-h-[200px] space-y-2"
                            ></ul>
                        </div>
                    </div>
                </div>

                <div
                    id="task-modal"
                    class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden"
                >
                    <div
                        class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white"
                    >
                        <h3 class="text-lg font-semibold mb-4">Add New Task</h3>
                        <input
                            id="task-title"
                            type="text"
                            placeholder="Task Title"
                            class="w-full p-2 mb-4 border rounded"
                        />
                        <textarea
                            id="task-description"
                            placeholder="Task Description"
                            class="w-full p-2 mb-4 border rounded h-24"
                        ></textarea>
                        <div class="flex justify-end">
                            <button
                                type="button"
                                onclick="closeTaskModal()"
                                class="bg-gray-300 hover:bg-gray-400 text-black font-bold py-2 px-4 rounded mr-2"
                            >
                                Cancel
                            </button>
                            <button
                                type="button"
                                onclick="addTask()"
                                class="bg-teal-500 hover:bg-teal-700 text-white font-bold py-2 px-4 rounded"
                            >
                                Add Task
                            </button>
                        </div>
                    </div>
                </div>

                <script>
                    const lists = ["todo-list", "progress-list", "done-list"];
                    lists.forEach((listId) => {
                        new Sortable(document.getElementById(listId), {
                            group: "shared",
                            animation: 150,
                            ghostClass: "bg-teal-100",
                            onEnd: (evt) => {
                                updateTaskStatus(evt.item.id, evt.to.id);
                            },
                        });
                    });

                    let currentList = "";

                    function openTaskModal(listId) {
                        currentList = listId;
                        document
                            .getElementById("task-modal")
                            .classList.remove("hidden");
                    }

                    function closeTaskModal() {
                        document
                            .getElementById("task-modal")
                            .classList.add("hidden");
                        document.getElementById("task-title").value = "";
                        document.getElementById("task-description").value = "";
                    }

                    function addTask() {
                        const title =
                            document.getElementById("task-title").value;
                        const description =
                            document.getElementById("task-description").value;
                        if (title) {
                            const taskId = "task-" + Date.now();
                            const taskElement = createTaskElement(
                                taskId,
                                title,
                                description,
                            );
                            document
                                .getElementById(currentList + "-list")
                                .appendChild(taskElement);
                            closeTaskModal();
                        }
                    }

                    function createTaskElement(id, title, description) {
                        const li = document.createElement("li");
                        li.id = id;
                        li.className =
                            "bg-white p-4 rounded shadow cursor-move";
                        li.innerHTML = `
                            <h3 class="font-semibold">${title}</h3>
                            <p class="text-sm text-gray-600">${description}</p>
                            <div class="flex justify-end mt-2">
                                <button onclick="editTask('${id}')" class="text-teal-500 hover:text-teal-700 mr-2">Edit</button>
                                <button onclick="deleteTask('${id}')" class="text-red-500 hover:text-red-700">Delete</button>
                            </div>
                        `;
                        return li;
                    }

                    function updateTaskStatus(taskId, newListId) {
                        console.log(`Task ${taskId} moved to ${newListId}`);
                        // Here you would typically update the task status in your backend
                    }

                    function editTask(taskId) {
                        const taskElement = document.getElementById(taskId);
                        const title =
                            taskElement.querySelector("h3").textContent;
                        const description =
                            taskElement.querySelector("p").textContent;

                        document.getElementById("task-title").value = title;
                        document.getElementById("task-description").value =
                            description;

                        currentList = taskElement.parentElement.id.replace(
                            "-list",
                            "",
                        );
                        openTaskModal(currentList);

                        taskElement.remove();
                    }

                    function deleteTask(taskId) {
                        if (
                            confirm(
                                "Are you sure you want to delete this task?",
                            )
                        ) {
                            document.getElementById(taskId).remove();
                        }
                    }
                </script>
            </div>
        </main>
    </body>
</html>
