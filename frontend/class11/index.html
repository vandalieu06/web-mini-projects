<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Class11 by Jhonny</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body>
        <header class="w-full px-2 py-8 bg-black">
            <div
                class="w-6xl mx-auto flex justify-between items-center text-white"
            >
                <h1 class="text-xl font-bold">Gestor Asientos</h1>
                <span class="username text-lg font-semibold capitalize"></span>
            </div>
        </header>

        <section class="w-full px-2 py-4 bg-gray-50">
            <div
                class="w-6xl mx-auto flex flex-col justify-center items-center"
            >
                <h2 class="text-xl font-bold">Lista Usuarios</h2>
                <div class="flex gap-4">
                    <select class="users-list">
                        <option value="jhonny">Jhonny</option>
                        <option value="milo">Milo</option>
                        <option value="juan">Juan</option>
                    </select>
                    <button
                        class="btn-reserva py-1 px-4 bg-black text-white rounded-md cursor-pointer"
                    >
                        Reservar
                    </button>
                </div>
            </div>
        </section>

        <section class="w-full px-2 bg-gray-50">
            <div class="w-full flex flex-col gap-4">
                <h2 class="text-xl md:text-center font-bold">Asientos</h2>
                <div class="md:w-xl md:mx-auto flex flex-col gap-4 seats"></div>
            </div>
        </section>

        <section class="w-full px-2 py-8 bg-white">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-xl font-bold mb-4 text-center">
                    Listado de Reservas
                </h2>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-black text-white">
                            <th class="p-2 text-center">Usuario</th>
                            <th class="p-2 text-center">Total Asientos</th>
                            <th class="p-2 text-center">
                                Coordenadas (Fila-Asiento)
                            </th>
                        </tr>
                    </thead>
                    <tbody class="user-table-body"></tbody>
                </table>
            </div>
        </section>

        <!-- Scripts -->
        <script src="./main.js"></script>
    </body>
</html>
