<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Tareas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="main.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --black: #0a0a0a;
        --white: #ffffff;
        --gray-100: #f5f5f5;
        --gray-200: #e5e5e5;
        --gray-300: #d4d4d4;
        --gray-400: #a3a3a3;
        --gray-500: #737373;
      }
      
      body {
        font-family: 'Space Mono', monospace;
        background-color: var(--gray-100);
        color: var(--black);
      }
      
      h1, h2, h3, .display-font {
        font-family: 'Syne', sans-serif;
      }
      
      .column-pendent {
        background-color: var(--gray-200);
      }
      
      .column-curs {
        background-color: var(--gray-300);
      }
      
      .column-finalitzada {
        background-color: var(--white);
      }
      
      .task-card {
        border: 2px solid var(--black);
        transition: all 0.2s ease;
      }
      
      .task-card:hover {
        transform: translateY(-2px);
        box-shadow: 4px 4px 0 var(--black);
      }
      
      .btn-primary {
        background-color: var(--black);
        color: var(--white);
        border: 2px solid var(--black);
        transition: all 0.2s ease;
      }
      
      .btn-primary:hover {
        background-color: var(--white);
        color: var(--black);
      }
      
      .btn-secondary {
        background-color: var(--white);
        color: var(--black);
        border: 2px solid var(--black);
        transition: all 0.2s ease;
      }
      
      .btn-secondary:hover {
        background-color: var(--black);
        color: var(--white);
      }
      
      .column-header {
        border-bottom: 3px solid var(--black);
      }
      
      .task-ghost {
        opacity: 0.5;
        background: var(--gray-300);
      }
      
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .task-card {
        animation: slideIn 0.3s ease forwards;
      }
    </style>
  </head>
  <body class="min-h-screen">
    <header class="w-full bg-black text-white py-4 px-6 md:px-12 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <h1 class="text-2xl md:text-3xl font-bold tracking-tight">GESTOR DE TAREAS</h1>
        <span id="user-info" class="text-sm text-gray-300 hidden md:inline"></span>
      </div>
      <button
        id="logout-btn"
        onclick="logout()"
        class="hidden btn-secondary px-4 py-2 text-sm font-bold uppercase tracking-wider"
      >
        Cerrar Sesión
      </button>
    </header>

    <main class="container mx-auto px-4 py-8">
      <div class="flex justify-end mb-6">
        <button
          id="add-task-btn"
          onclick="openAddTaskModal()"
          class="hidden btn-primary px-6 py-3 font-bold uppercase tracking-wider"
        >
          + Añadir tarea
        </button>
      </div>

      <div class="flex flex-col lg:flex-row gap-6">
        <section class="flex-1 columna-pendent p-4 rounded-lg border-2 border-black min-h-[400px]">
          <h2 class="text-xl font-bold mb-4 pb-2 column-header uppercase tracking-wider">
            Pendientes
          </h2>
          <ul id="pendents" class="space-y-3 min-h-[200px]"></ul>
        </section>

        <section class="flex-1 columna-curs p-4 rounded-lg border-2 border-black min-h-[400px]">
          <h2 class="text-xl font-bold mb-4 pb-2 column-header uppercase tracking-wider">
            En Curso
          </h2>
          <ul id="en-curs" class="space-y-3 min-h-[200px]"></ul>
        </section>

        <section class="flex-1 columna-finalitzada p-4 rounded-lg border-2 border-black min-h-[400px]">
          <h2 class="text-xl font-bold mb-4 pb-2 column-header uppercase tracking-wider">
            Finalizadas
          </h2>
          <ul id="finalitzades" class="space-y-3 min-h-[200px]"></ul>
        </section>
      </div>
    </main>

    <dialog id="task-modal" class="p-0 border-2 border-black rounded-lg w-full max-w-md">
      <div class="bg-white p-6">
        <h3 class="text-xl font-bold mb-4 uppercase tracking-wider border-b-2 border-black pb-2">
          Nueva Tarea
        </h3>
        <form id="task-form" class="space-y-4">
          <div>
            <label class="block text-sm font-bold mb-1 uppercase tracking-wider">Título</label>
            <input
              id="task-title"
              type="text"
              required
              class="w-full p-3 border-2 border-black focus:outline-none focus:ring-2 focus:ring-black"
              placeholder="Título de la tarea"
            />
          </div>
          <div>
            <label class="block text-sm font-bold mb-1 uppercase tracking-wider">Descripción</label>
            <textarea
              id="task-description"
              class="w-full p-3 border-2 border-black focus:outline-none focus:ring-2 focus:ring-black h-24"
              placeholder="Descripción de la tarea"
            ></textarea>
          </div>
          <div>
            <label class="block text-sm font-bold mb-1 uppercase tracking-wider">Asignar a</label>
            <select
              id="task-assignee"
              class="w-full p-3 border-2 border-black focus:outline-none focus:ring-2 focus:ring-black"
            >
              <option value="Admin">Admin</option>
              <option value="Jhonny">Jhonny</option>
              <option value="Maria">Maria</option>
              <option value="Carlos">Carlos</option>
            </select>
          </div>
          <div class="flex gap-3 pt-2">
            <button
              type="button"
              onclick="closeAddTaskModal()"
              class="flex-1 btn-secondary py-3 font-bold uppercase tracking-wider"
            >
              Cancelar
            </button>
            <button
              type="submit"
              class="flex-1 btn-primary py-3 font-bold uppercase tracking-wider"
            >
              Crear
            </button>
          </div>
        </form>
      </div>
    </dialog>

    <dialog id="edit-modal" class="p-0 border-2 border-black rounded-lg w-full max-w-md">
      <div class="bg-white p-6">
        <h3 class="text-xl font-bold mb-4 uppercase tracking-wider border-b-2 border-black pb-2">
          Editar Tarea
        </h3>
        <form id="edit-form" class="space-y-4">
          <input type="hidden" id="edit-task-id" />
          <div>
            <label class="block text-sm font-bold mb-1 uppercase tracking-wider">Título</label>
            <input
              id="edit-title"
              type="text"
              required
              class="w-full p-3 border-2 border-black focus:outline-none focus:ring-2 focus:ring-black"
            />
          </div>
          <div>
            <label class="block text-sm font-bold mb-1 uppercase tracking-wider">Descripción</label>
            <textarea
              id="edit-description"
              class="w-full p-3 border-2 border-black focus:outline-none focus:ring-2 focus:ring-black h-24"
            ></textarea>
          </div>
          <div class="flex gap-3 pt-2">
            <button
              type="submit"
              class="flex-1 btn-primary py-3 font-bold uppercase tracking-wider"
            >
              Guardar
            </button>
            <button
              type="button"
              onclick="closeEditModal()"
              class="flex-1 btn-secondary py-3 font-bold uppercase tracking-wider"
            >
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </dialog>
  </body>
</html>
