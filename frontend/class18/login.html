<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Gestor de Tareas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="login.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --black: #0a0a0a;
        --white: #ffffff;
      }
      
      body {
        font-family: 'Space Mono', monospace;
        background-color: var(--white);
        color: var(--black);
      }
      
      .display-font {
        font-family: 'Syne', sans-serif;
      }
      
      .input-field {
        border: 2px solid var(--black);
        transition: all 0.2s ease;
      }
      
      .input-field:focus {
        outline: none;
        box-shadow: 4px 4px 0 var(--black);
      }
      
      .btn-primary {
        background-color: var(--black);
        color: var(--white);
        border: 2px solid var(--black);
        transition: all 0.2s ease;
      }
      
      .btn-primary:hover {
        background-color: var(--white);
        color: var(--black);
        box-shadow: 4px 4px 0 var(--black);
      }
      
      .login-card {
        border: 3px solid var(--black);
      }
      
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .login-card {
        animation: fadeIn 0.5s ease forwards;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center px-4">
    <div class="login-card bg-white p-8 md:p-12 w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="display-font text-4xl md:text-5xl font-extrabold tracking-tight mb-2">
          GESTOR
        </h1>
        <p class="text-sm uppercase tracking-widest text-gray-600">
          Iniciar Sesión
        </p>
      </div>

      <form id="login-form" class="space-y-6">
        <div>
          <label class="block text-sm font-bold mb-2 uppercase tracking-wider">
            Email
          </label>
          <input
            id="email"
            type="email"
            required
            class="input-field w-full p-3 bg-white"
            placeholder="correo@ejemplo.com"
          />
        </div>
        
        <div>
          <label class="block text-sm font-bold mb-2 uppercase tracking-wider">
            Password
          </label>
          <input
            id="password"
            type="password"
            required
            class="input-field w-full p-3 bg-white"
            placeholder="••••••••"
          />
        </div>

        <button
          type="submit"
          class="w-full btn-primary py-4 font-bold uppercase tracking-wider"
        >
          Entrar
        </button>
      </form>

      <div class="mt-8 pt-6 border-t-2 border-black">
        <p class="text-xs text-center text-gray-500 mb-3">
          <span class="font-bold">Usuarios demo:</span>
        </p>
        <div class="text-xs space-y-1 text-center text-gray-600">
          <p>admin@admin.com / admin123 (Admin)</p>
          <p>jhonny@test.com / 1111 (Usuario)</p>
          <p>maria@test.com / 2222 (Usuario)</p>
        </div>
      </div>
    </div>
  </body>
</html>
